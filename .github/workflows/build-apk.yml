name: Build ZChat APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Clean old mipmap files
      run: |
        rm -rf app/src/main/res/mipmap-mdpi
        rm -rf app/src/main/res/mipmap-hdpi
        rm -rf app/src/main/res/mipmap-xhdpi
        rm -rf app/src/main/res/mipmap-xxhdpi
        rm -rf app/src/main/res/mipmap-xxxhdpi
        rm -rf app/src/main/res/mipmap-anydpi-v26

    - name: Create launcher icons with Python
      run: |
        python3 << 'EOF'
        import os, struct, zlib
        def create_png(w, h, c=(99,102,241)):
            sig = b'\x89PNG\r\n\x1a\n'
            ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
            ihdr_crc = zlib.crc32(b'IHDR' + ihdr) & 0xffffffff
            raw = b''.join([b'\x00' + bytes(c)*w for _ in range(h)])
            comp = zlib.compress(raw, 9)
            idat_crc = zlib.crc32(b'IDAT' + comp) & 0xffffffff
            iend_crc = zlib.crc32(b'IEND') & 0xffffffff
            return sig + struct.pack('>I',13) + b'IHDR' + ihdr + struct.pack('>I',ihdr_crc) + struct.pack('>I',len(comp)) + b'IDAT' + comp + struct.pack('>I',idat_crc) + struct.pack('>I',0) + b'IEND' + struct.pack('>I',iend_crc)
        sizes = {'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
        for d,s in sizes.items():
            os.makedirs(f'app/src/main/res/mipmap-{d}', exist_ok=True)
            png = create_png(s, s)
            open(f'app/src/main/res/mipmap-{d}/ic_launcher.png','wb').write(png)
            open(f'app/src/main/res/mipmap-{d}/ic_launcher_round.png','wb').write(png)
        print('Icons created!')
        EOF

    - name: Debug - Check secret
      run: |
        echo "Checking GOOGLE_SERVICES_JSON secret..."
        if [ -z "$GOOGLE_SERVICES_JSON" ]; then
          echo "ERROR: Secret is EMPTY or NOT SET!"
          exit 1
        else
          echo "Secret exists, length: ${#GOOGLE_SERVICES_JSON} characters"
          echo "First 50 chars: ${GOOGLE_SERVICES_JSON:0:50}..."
        fi

    - name: Create google-services.json
      run: |
        mkdir -p app/src
        echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json
        echo "File created, size: $(wc -c < app/google-services.json) bytes"
        echo "Content preview:"
        head -c 300 app/google-services.json
        echo ""

    - name: Download Gradle Wrapper
      run: |
        curl -L https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
        unzip gradle.zip
        ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zchat-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
